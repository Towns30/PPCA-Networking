# Network scenarios for the congestion-control testbed.
#
# One scenario per line. Columns:
#   name        short id, used in result filenames
#   bw          bottleneck bandwidth (tc rate syntax, e.g. 50mbit)
#   rtt_ms      base round-trip time in ms (split half onto each direction)
#   loss_pct    random packet loss on the download path, percent
#   qlen        bottleneck queue length in PACKETS (controls bufferbloat:
#               ~BDP is well-tuned, >>BDP is a deep/bloated buffer, <<BDP is shallow)
#   weight      relative weight in the final score
#
# name          bw        rtt_ms  loss_pct  qlen   weight
lan             1000mbit  4       0         2000   1
broadband       50mbit    40      0         420    2
transpacific    100mbit   160     0.1       3400   3
lossy           50mbit    80      2.0       850    3
bufferbloat     20mbit    40      0         4000   2
shallow         50mbit    40      0         25     2
